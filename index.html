<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Journal</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 24px;
      color: #2d6a4f;
    }

    .editor {
      background: #fff;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      margin-bottom: 32px;
    }

    textarea {
      width: 100%;
      height: 160px;
      resize: vertical;
      border: 1px solid #cdd9e5;
      border-radius: 8px;
      padding: 12px;
      font-size: 1rem;
      line-height: 1.6;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: #2d6a4f;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      background: #2d6a4f;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #1b4332;
    }

    button:disabled {
      background: #a8c5b5;
      cursor: not-allowed;
    }

    h2 {
      font-size: 1.2rem;
      margin-bottom: 16px;
      color: #555;
    }

    #entries-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .entry {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      position: relative;
    }

    .entry-date {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 8px;
    }

    .entry-text {
      font-size: 1rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .entry-delete {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0;
      width: auto;
      margin: 0;
      transition: color 0.2s;
    }

    .entry-delete:hover {
      background: none;
      color: #e63946;
    }

    .empty-state {
      text-align: center;
      color: #aaa;
      font-size: 0.95rem;
      padding: 24px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📓 My Journal</h1>

    <div class="editor">
      <textarea id="entry-input" placeholder="Write your thoughts for today…"></textarea>
      <button id="save-btn" disabled>Save Entry</button>
    </div>

    <h2>Previous Entries</h2>
    <div id="entries-list"></div>
  </div>

  <script>
    const textarea = document.getElementById('entry-input');
    const saveBtn = document.getElementById('save-btn');
    const entriesList = document.getElementById('entries-list');

    const STORAGE_KEY = 'journal_entries';

    function loadEntries() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        if (!Array.isArray(parsed)) return [];
        return parsed.filter(
          (e) => e && typeof e.id === 'number' && typeof e.date === 'string' && typeof e.text === 'string'
        );
      } catch {
        return [];
      }
    }

    function saveEntries(entries) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleString(undefined, {
        weekday: 'long',
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
      });
    }

    function renderEntries() {
      const entries = loadEntries();
      entriesList.innerHTML = '';

      if (entries.length === 0) {
        entriesList.innerHTML = '<p class="empty-state">No entries yet. Start writing above!</p>';
        return;
      }

      entries.slice().reverse().forEach((entry) => {
        const article = document.createElement('article');
        article.className = 'entry';

        const dateEl = document.createElement('p');
        dateEl.className = 'entry-date';
        dateEl.textContent = formatDate(entry.date);

        const textEl = document.createElement('p');
        textEl.className = 'entry-text';
        textEl.textContent = entry.text;

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'entry-delete';
        deleteBtn.title = 'Delete entry';
        deleteBtn.textContent = '✕';
        deleteBtn.addEventListener('click', () => deleteEntry(entry.id));

        article.appendChild(dateEl);
        article.appendChild(textEl);
        article.appendChild(deleteBtn);
        entriesList.appendChild(article);
      });
    }

    function addEntry(text) {
      const entries = loadEntries();
      entries.push({ id: Date.now() + Math.floor(Math.random() * 1000), date: new Date().toISOString(), text });
      saveEntries(entries);
      renderEntries();
    }

    function deleteEntry(id) {
      const entries = loadEntries().filter((e) => e.id !== id);
      saveEntries(entries);
      renderEntries();
    }

    // Enable/disable save button based on textarea content
    textarea.addEventListener('input', () => {
      saveBtn.disabled = textarea.value.trim() === '';
    });

    saveBtn.addEventListener('click', () => {
      const text = textarea.value.trim();
      if (!text) return;
      addEntry(text);
      textarea.value = '';
      saveBtn.disabled = true;
      textarea.focus();
    });

    // Initial render
    renderEntries();
  </script>
</body>
</html>
