<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Journal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 30px 16px;
    }
    h1 {
      font-size: 2rem;
      color: #2d3748;
      margin-bottom: 24px;
    }
    .editor {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 20px;
      width: 100%;
      max-width: 640px;
    }
    textarea {
      width: 100%;
      height: 130px;
      resize: vertical;
      border: 1px solid #cbd5e0;
      border-radius: 8px;
      padding: 10px;
      font-size: 1rem;
      font-family: inherit;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: #4299e1; }
    .error { color: #e53e3e; font-size: 0.85rem; margin-top: 6px; min-height: 1em; }
    .save-btn {
      margin-top: 12px;
      padding: 10px 28px;
      background: #4299e1;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .save-btn:hover { background: #3182ce; }
    h2 {
      font-size: 1.2rem;
      color: #4a5568;
      margin: 28px 0 12px;
      align-self: flex-start;
      width: 100%;
      max-width: 640px;
    }
    #entries { width: 100%; max-width: 640px; }
    .entry {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      padding: 14px 16px;
      margin-bottom: 12px;
      text-align: left;
      position: relative;
    }
    .entry-timestamp {
      font-size: 0.75rem;
      color: #a0aec0;
      margin-bottom: 6px;
    }
    .entry-text {
      font-size: 1rem;
      color: #2d3748;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .delete-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: #a0aec0;
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .delete-btn:hover { color: #e53e3e; }
    .no-entries {
      color: #a0aec0;
      font-size: 0.95rem;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>

<h1>📓 Daily Journal</h1>

<div class="editor">
  <textarea id="text" placeholder="Write your thoughts for today…"></textarea>
  <p class="error" id="error"></p>
  <button class="save-btn" onclick="saveEntry()">Save Entry</button>
</div>

<h2>Entries</h2>
<div id="entries"></div>

<script>
  const STORAGE_KEY = 'journal_entries';

  function loadEntries() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    } catch {
      return [];
    }
  }

  function persistEntries(entries) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function renderEntries() {
    const container = document.getElementById('entries');
    const entries = loadEntries();
    if (entries.length === 0) {
      container.innerHTML = '<p class="no-entries">No entries yet. Start writing!</p>';
      return;
    }
    container.innerHTML = '';
    for (var i = entries.length - 1; i >= 0; i--) {
      var entry = entries[i];
      var div = document.createElement('div');
      div.className = 'entry';

      var timestamp = document.createElement('p');
      timestamp.className = 'entry-timestamp';
      timestamp.textContent = entry.timestamp;

      var text = document.createElement('p');
      text.className = 'entry-text';
      text.textContent = entry.text;

      var btn = document.createElement('button');
      btn.className = 'delete-btn';
      btn.title = 'Delete entry';
      btn.textContent = '✕';
      btn.addEventListener('click', (function(idx) {
        return function() { deleteEntry(idx); };
      })(i));

      div.appendChild(timestamp);
      div.appendChild(text);
      div.appendChild(btn);
      container.appendChild(div);
    }
  }

  function saveEntry() {
    const textarea = document.getElementById('text');
    const errorEl = document.getElementById('error');
    const text = textarea.value.trim();

    if (!text) {
      errorEl.textContent = 'Please write something before saving.';
      textarea.focus();
      return;
    }
    errorEl.textContent = '';

    const entries = loadEntries();
    entries.push({
      text: text,
      timestamp: new Date().toLocaleString()
    });
    persistEntries(entries);
    textarea.value = '';
    renderEntries();
  }

  function deleteEntry(index) {
    const entries = loadEntries();
    entries.splice(index, 1);
    persistEntries(entries);
    renderEntries();
  }

  renderEntries();
</script>

</body>
</html>
